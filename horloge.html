<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>Horloge</title>
    <style>
        @font-face {
            font-family: digital;
            src: url(fonts/Digital\ Dismay.otf);
        }

        line{
            stroke-linecap: round;
        }
        .rotatable:hover{
            cursor: pointer;
        }
        #minutes:hover{
            fill:black;
        }

        #heures:hover{
            fill:rgb(160, 0, 0);
        }
        .cadran{
            stroke:red;
            stroke-width:3;
            fill:transparent;
        }
        .tick.h{
            stroke:red;
            stroke-width:3;
        }
        .tick.h.mark{
            stroke:red;
            stroke-width:5;
        }
        .tick.m{
            stroke:black;
            stroke-width:2;
        }
        .digit{
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        .h.digit{
            font-weight: bold;
            fill:red;
        }

        h1{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        } 
        #digital{
            font-family: digital;
            text-align: center;
            font-size: xx-large;
        }
        #digital #h{
            color:red;
        }
        #digital #s{
            color:blue;
        }

        svg{
            border:1px solid black;
            display: block;
            margin:auto;
           
        }
        html, body{
            height:100%;
        }
        body{
            display: flex;
            margin: 0;
            padding:0;
            flex-direction: column;
            justify-content: space-around;
        }
        #live{
            cursor:pointer;
            background-color: red;
            border:solid 1px black;
            vertical-align: middle;
            margin-right:20px;
        }
        #ampm{
            cursor:pointer;
            border:solid 1px black;
            vertical-align: middle;
            margin-right:20px;
            width:80px;
        }
        .enabler{
            text-align: center;
        }
        .enabler button {
            border:solid 1px black;
            font-size:70%;
        }
        
    </style>
</head>

<body>
    <h1>Horloge</h1>
<div class="enabler">
    <button class="m">Minutes</button>
    <button class="h">Heures</button>
    <button class="hh">Heures 3.6.9.12</button>
    <button class="gradm">grad. M</button>
    <button class="gradh">grad. H</button>
    <button class="gradhh">grad. 3.6.9.12</button>
    <button class="cadran">cadran</button>
</div>
<div>
    <p> Graduation : <input type="range" id="vol" name="vol" min="0" max="3" step="1" /></p>
</div>
<svg height="500" width="600" onload="makeRotatable(evt)" >
    <g id="clock"></g>
    <g id="minutes" class="rotatable" fill="gray" >
        <circle cx="0" cy="0" r="25" />
        <polygon points="0 -25, 0 25, 185 0" />
        <circle cx="0" cy="0" r="10" fill="white" />
    </g>
    <g id="heures" class="rotatable" fill="red" >
        <circle cx="0" cy="0" r="20" />
        <polygon points="0 -20, 0 20, 120 0" />
        <circle cx="0" cy="0" r="10" fill="white" />
    </g>
    <g id="secondes" class="rotatable live" fill="blue" >
        <circle cx="0" cy="0" r="2" />
        <polygon points="0 -2, 0 2, 190 0" />
    </g>
</svg>
<div id="digital">
    <button id="live">Live</button><span id="h">00</span>:<span id="m">00</span><span class="live">:<span id="s">00</span></span><button id="ampm">Matin</button>
</div>

<script>
    var isAm=new Date().getHours()<12;
    document.getElementById("ampm").innerHTML=isAm?"matin":"après-midi";
    document.getElementById("ampm").style.visibility="hidden";
    var live=true;
    var cx=300;
    var cy=250;
    var radius=200;
    var shortTickSize=5;
    var longTickSize=15;
    var hourDigitDistance=230;
    var minutesDigitDistance=208;
   
    var clock=document.getElementById("clock");
    for(var i=0;i<60;i++){
        var l=shortTickSize;
        var cl="tick";
        if(i%5==0){
            if(i%15==0){
                cl+=" mark";
            }
            cl+=" h";
            l=longTickSize;
            clock.appendChild(toSvg("text",{"class":(i%15==0)?"h digit mark":"h digit","x1":0,"y1":0,"font-size":30,"text-anchor":"middle","alignment-baseline":"middle","transform":"translate("+cx+" "+cy+") rotate("+i*6+") translate(0 -"+hourDigitDistance+") rotate("+(-i*6)+")"},i/5==0?"12":i/5));
        }else{
            cl+=" m";
        }
        clock.appendChild(toSvg("line",{"class":cl,"x1":0,"y1":0,"x2":l,"y2":0,"transform":"translate("+cx+" "+cy+") rotate("+i*6+") translate("+(radius-l)+" 0)"}));
        clock.appendChild(toSvg("text",{"class":"m digit","x1":0,"y1":0,"font-size":8,"text-anchor":"middle","alignment-baseline":"middle","transform":"translate("+cx+" "+cy+") rotate("+i*6+") translate(0 -"+minutesDigitDistance+") rotate("+(-i*6)+")"},leftPad(i,2,"0")));
    }
    clock.appendChild(toSvg("circle",{"class":"cadran","cx":cx,"cy":cy,"r":radius}));
    document.getElementById("heures").setAttributeNS(null,"transform","translate("+cx+" "+cy+") rotate(-90)");
    document.getElementById("minutes").setAttributeNS(null,"transform","translate("+cx+" "+cy+") rotate(-90)");
    document.getElementById("secondes").setAttributeNS(null,"transform","translate("+cx+" "+cy+") rotate(-90)");

    function configureButton(button,element){
        document.querySelectorAll(button)[0].addEventListener('mouseup', function(){
        var current = document.querySelectorAll(element)[0].style.visibility;
        document.querySelectorAll(element).forEach(e=>e.style.visibility=(current=="hidden"?"visible":"hidden"))
       });
    }
    configureButton(".enabler button.cadran","circle.cadran");
    configureButton(".enabler button.m","text.m");
    configureButton(".enabler button.h","text.h:not(.mark)");
    configureButton(".enabler button.hh","text.h.mark");
    configureButton(".enabler button.gradm","line.m");
    configureButton(".enabler button.gradh","line.h:not(.mark)");
    configureButton(".enabler button.gradhh","line.h.mark");


    function toSvg(tagName,attrs,body){
        var elt=document.createElementNS("http://www.w3.org/2000/svg",tagName);
        for(var k in attrs){
            elt.setAttributeNS(null,k,attrs[k]);
        } 
        elt.innerHTML=body;
        return elt;
    }


    function leftPad(string,length,char){
        var result = ""+string;
        while(result.length<length){
            result=char+result;
        }
        return result;
    }

    var nowInterval=setInterval(now,1000);
   
    function now(){
        var now=new Date();
        var heures = now.getHours()%24;
        var minutes = now.getMinutes();
        var secondes = now.getSeconds();
        document.getElementById("h").innerText = leftPad(String(heures),2,"0");
        document.getElementById("m").innerText = leftPad(String(minutes), 2, "0");
        document.getElementById("s").innerText = leftPad(String(secondes), 2, "0");
        document.getElementById("heures").transform.baseVal.getItem(1).setRotate((heures*30+(minutes*30/60))-90,0,0);
        document.getElementById("minutes").transform.baseVal.getItem(1).setRotate((minutes*6+(6*secondes/60))-90,0,0);
        
       
        document.getElementById("secondes").transform.baseVal.getItem(1).setRotate(secondes*6-90,0,0);
    }

    document.getElementById("live").addEventListener('mouseup', function(){
        if(live){
            clearInterval(nowInterval);
            document.querySelectorAll(".live").forEach(e=>e.style.visibility="hidden");
            document.getElementById("live").style.backgroundColor="white";
            document.getElementById("ampm").style.visibility="visible";
            live=false;
        }else{
            nowInterval=setInterval(now,100);
            document.querySelectorAll(".live").forEach(e=>e.style.visibility="visible");
            document.getElementById("live").style.backgroundColor="red";
            document.getElementById("ampm").style.visibility="hidden";
            live=true;
        }
    });

    document.getElementById("ampm").addEventListener('mouseup', function(){
        var currentHour = Number(document.getElementById("h").innerHTML);
        isAm=!isAm;
        document.getElementById("h").innerHTML=String(leftPad((currentHour+12)%(isAm?12:24),2,"0"));
        document.getElementById("ampm").innerHTML=isAm?"matin":"après-midi";
    });


    var selectedElement = false;
    function makeRotatable(evt) {
            var svg = evt.target;
            svg.addEventListener('mousedown', startRotate);
            svg.addEventListener('mousemove', rotate);
            svg.addEventListener('mouseup', endRotate);
            svg.addEventListener('mouseleave', endRotate);
            svg.addEventListener('touchstart', startRotate);
            svg.addEventListener('touchmove', rotate);
            svg.addEventListener('touchend', endRotate);
            svg.addEventListener('touchcancel', endRotate);
            svg.addEventListener('touchleave', endRotate);
            function startRotate(evt) {
                if (evt.target.parentNode.classList.contains('rotatable')) {
                    selectedElement = evt.target.parentNode;
                }
            }
            function getMousePosition(evt) {
                var CTM = svg.getScreenCTM();
                if (evt.touches) { evt = evt.touches[0]; }
                return {
                    x: (evt.clientX - CTM.e) / CTM.a,
                    y: (evt.clientY - CTM.f) / CTM.d
                };
            }   
            function rotate(evt) {
                if (selectedElement) {
                    evt.preventDefault();
                    var dim = evt.target.getBoundingClientRect();
                    var mousePos = getMousePosition(evt);
                    var dx=mousePos.x-cx;
                    var dy=mousePos.y-cy;
                   
                    var angleSouris = (Math.atan2(dy, dx) * 180 / Math.PI)+90 ;
                    if(angleSouris<0){
                        angleSouris+=360;
                    }
                    var angleAiguille = selectedElement.transform.baseVal.getItem(1).angle+90;
                    if (selectedElement.id == "minutes") {
                        if(angleAiguille<0){
                            angleAiguille = 12*360+angleAiguille;
                        }
                        if(angleAiguille>12*360){
                            angleAiguille = angleAiguille-(12*360);
                        }
                    }
                    if (selectedElement.id == "heures") {
                        if (angleAiguille < 0) {
                            angleAiguille = 360 + angleAiguille;
                        }
                        if (angleAiguille > 360) {
                            angleAiguille = angleAiguille - (360);
                        }
                    }
                    var delta = angleSouris-angleAiguille%360;
                    var da=null;
                    if(delta<-180){
                        da = (360 - angleAiguille % 360) + angleSouris;
                    }
                    if(delta>180){
                        da = -1*((360-angleSouris)+(angleAiguille%360));
                    }
                    if(da!=null){
                        delta = da;
                    }
                    selectedElement.transform.baseVal.getItem(1).setRotate(angleAiguille+delta-90, 0, 0);
                    if(selectedElement.id=="minutes"){
                        updateHeures(angleAiguille + delta);
                    }
                    if (selectedElement.id == "heures") {
                        updateMinutes(angleAiguille + delta);
                    }
                    
                }
            }

            function updateHeures(angle){
                var aiguille = document.getElementById("heures");
                aiguille.transform.baseVal.getItem(1).setRotate((angle/12)-90,0,0);
                var heures = Math.floor(angle / 360);
                var minutes = Math.floor((angle % 360) / 6);
                document.getElementById("h").innerText = leftPad(String(heures+(!isAm?12:0)),2,"0");
                document.getElementById("m").innerText = leftPad(String(minutes), 2, "0");
            }

            function updateMinutes(angle) {
                var aiguille = document.getElementById("minutes");
                aiguille.transform.baseVal.getItem(1).setRotate((angle * 12) - 90, 0, 0);
                var heures = Math.floor(angle*12 / 360);
                var minutes = Math.floor((angle*12 % 360) / 6);
                document.getElementById("h").innerText = leftPad(String(heures+(!isAm?12:0)),2,"0");
                document.getElementById("m").innerText = leftPad(String(minutes), 2, "0");
            }
            function updateSecondes(angle) {
                var aiguille = document.getElementById("secondes");
                aiguille.transform.baseVal.getItem(1).setRotate(angle-90, 0, 0);
                
            }
  
            
            function endRotate(evt) {
                selectedElement = null;
            }

            
        }


</script>
</body>

</html>
