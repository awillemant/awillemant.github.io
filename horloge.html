        html, body{
            height:100%;
        }
        body{
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
	        align-items: stretch;
            margin: 0;
            padding:0;
            text-align: center;
        }
        h1{
            margin:0;
            padding:10px;
        } 
        #config{
            margin:0;
            padding:20px;
        }
        #playground{
            flex-grow: 1;
            display:flex;
            align-items: center;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        line{
            stroke-linecap: round;
        }
        .rotatable:hover{
            cursor: pointer;
        }
        #minutes:hover{
            fill:black;
        }

        #heures:hover{
            fill:rgb(160, 0, 0);
        }
        .cadran{
            stroke:red;
            stroke-width:3;
            fill:transparent;
        }
        .tick.h{
            stroke:red;
            stroke-width:3;
        }
        .tick.h.mark{
            stroke:red;
            stroke-width:5;
        }
        .tick.m{
            stroke:black;
            stroke-width:2;
        }
        .h.digit{
            font-weight: bold;
            fill:red;
        }
        #digital{
            min-width: 300px;
        }
        #digital p{
            font-family: digital;
            text-align: center;
            font-size:500%;
            margin: 0;
        }
        #digital #h{
            color:red;
        }
        #digital #s{
            color:blue;
        }
        svg{
            border:1px solid black;
            display: block;     
        }   
        #live{
            cursor:pointer;
            background-color: red;
            border:solid 1px black;
            vertical-align: middle;
            font-size: x-large;
            margin-left: 50px;
            padding: 5px 10px;
        }
        #ampm{
            cursor:pointer;
            border:solid 1px black;
            vertical-align: middle;
            margin:10px auto;
            font-size: x-large;
        }
        [type=range]{
            -webkit-appearance: none;
            appearance: none;
            width: 200px;
            height: 2px;
            background: #000;
            cursor: pointer;
            vertical-align: middle;
        }
        [type=range]::-webkit-slider-thumb{
            -webkit-appearance: none;
            appearance: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border:2px solid red;
            background: #fff;
            cursor: pointer;
            vertical-align: middle;
        }
        
    </style>

<h1>Horloge</h1>
<div id="config">
        Graduation : <input type="range" id="grad" name="grad" min="0" max="4" step="1" value="4" />
        Chiffres : <input type="range" id="digits" name="digits" min="0" max="3" step="1" value="3" />
        <button id="live"> mode Live : on</button>
</div>
<div id="playground">
    <svg height="700" width="700" onload="makeRotatable(evt)" >
        <g id="clock"></g>
        <g id="minutes" class="rotatable" fill="gray" >
            <circle cx="0" cy="0" r="30" />
            <polygon points="0 -30, 0 30, 250 0" />
            <circle cx="0" cy="0" r="10" fill="white" />
        </g>
        <g id="heures" class="rotatable" fill="red" >
            <circle cx="0" cy="0" r="25" />
            <polygon points="0 -25, 0 25, 150 0" />
            <circle cx="0" cy="0" r="10" fill="white" />
        </g>
        <g id="secondes" class="rotatable live" fill="blue" >
            <circle cx="0" cy="0" r="2" />
            <polygon points="0 -2, 0 2, 260 0" />
        </g>
    </svg>
    <div id="digital">
        <p><span id="h">00</span>:<span id="m">00</span><span class="live">:<span id="s">00</span></span></p>
        <button id="ampm">Matin</button>
    </div>
</div>

<script>
function displayNow(){
    var now=new Date();
    var heures = now.getHours()%24;
    var minutes = now.getMinutes();
    var secondes = now.getSeconds();
    document.getElementById("h").innerText = leftPad(String(heures),2,"0");
    document.getElementById("m").innerText = leftPad(String(minutes), 2, "0");
    document.getElementById("s").innerText = leftPad(String(secondes), 2, "0");
    document.getElementById("heures").transform.baseVal.getItem(1).setRotate((heures*30+(minutes*30/60))-90,0,0);
    document.getElementById("minutes").transform.baseVal.getItem(1).setRotate((minutes*6+(6*secondes/60))-90,0,0);
    document.getElementById("secondes").transform.baseVal.getItem(1).setRotate(secondes*6-90,0,0);
}

function makeRotatable(evt) {
    var selectedElement = false;
    var svg = evt.target;
    svg.addEventListener('mousedown', startRotate);
    svg.addEventListener('mousemove', rotate);
    svg.addEventListener('mouseup', endRotate);
    svg.addEventListener('mouseleave', endRotate);
    svg.addEventListener('touchstart', startRotate);
    svg.addEventListener('touchmove', rotate);
    svg.addEventListener('touchend', endRotate);
    svg.addEventListener('touchcancel', endRotate);
    svg.addEventListener('touchleave', endRotate);
    function startRotate(evt) {
        if (evt.target.parentNode.classList.contains('rotatable')) {
            selectedElement = evt.target.parentNode;
        }
    }
    function getMousePosition(evt) {
        var CTM = svg.getScreenCTM();
        if (evt.touches) { evt = evt.touches[0]; }
        return {
            x: (evt.clientX - CTM.e) / CTM.a,
            y: (evt.clientY - CTM.f) / CTM.d
        };
    }   
    function rotate(evt) {
        if (selectedElement) {
            evt.preventDefault();
            var dim = evt.target.getBoundingClientRect();
            var mousePos = getMousePosition(evt);
            var dx=mousePos.x-cx;
            var dy=mousePos.y-cy;
            
            var angleSouris = (Math.atan2(dy, dx) * 180 / Math.PI)+90 ;
            if(angleSouris<0){
                angleSouris+=360;
            }
            var angleAiguille = selectedElement.transform.baseVal.getItem(1).angle+90;
            if (selectedElement.id == "minutes") {
                if(angleAiguille<0){
                    angleAiguille = 12*360+angleAiguille;
                }
                if(angleAiguille>12*360){
                    angleAiguille = angleAiguille-(12*360);
                }
            }
            if (selectedElement.id == "heures") {
                if (angleAiguille < 0) {
                    angleAiguille = 360 + angleAiguille;
                }
                if (angleAiguille > 360) {
                    angleAiguille = angleAiguille - (360);
                }
            }
            var delta = angleSouris-angleAiguille%360;
            var da=null;
            if(delta<-180){
                da = (360 - angleAiguille % 360) + angleSouris;
            }
            if(delta>180){
                da = -1*((360-angleSouris)+(angleAiguille%360));
            }
            if(da!=null){
                delta = da;
            }
            selectedElement.transform.baseVal.getItem(1).setRotate(angleAiguille+delta-90, 0, 0);
            if(selectedElement.id=="minutes"){
                updateHeures(angleAiguille + delta);
            }
            if (selectedElement.id == "heures") {
                updateMinutes(angleAiguille + delta);
            }
            
        }
    }

    function updateHeures(angle){
        var aiguille = document.getElementById("heures");
        aiguille.transform.baseVal.getItem(1).setRotate((angle/12)-90,0,0);
        var heures = Math.floor(angle / 360);
        var minutes = Math.floor((angle % 360) / 6);
        document.getElementById("h").innerText = leftPad(String(heures+(!isAm?12:0)),2,"0");
        document.getElementById("m").innerText = leftPad(String(minutes), 2, "0");
    }

    function updateMinutes(angle) {
        var aiguille = document.getElementById("minutes");
        aiguille.transform.baseVal.getItem(1).setRotate((angle * 12) - 90, 0, 0);
        var heures = Math.floor(angle*12 / 360);
        var minutes = Math.floor((angle*12 % 360) / 6);
        document.getElementById("h").innerText = leftPad(String(heures+(!isAm?12:0)),2,"0");
        document.getElementById("m").innerText = leftPad(String(minutes), 2, "0");
    }
    function updateSecondes(angle) {
        var aiguille = document.getElementById("secondes");
        aiguille.transform.baseVal.getItem(1).setRotate(angle-90, 0, 0);
        
    }

    
    function endRotate(evt) {
        selectedElement = null;
    }

    
}

function toSvg(tagName,attrs,body){
    var elt=document.createElementNS("http://www.w3.org/2000/svg",tagName);
    for(var k in attrs){
        elt.setAttributeNS(null,k,attrs[k]);
    } 
    elt.innerHTML=body;
    return elt;
}


function leftPad(string,length,char){
    var result = ""+string;
    while(result.length<length){
        result=char+result;
    }
    return result;
}
</script>
<script>
var isAm=new Date().getHours()<12;
var live=true;
var cx=350;
var cy=350;
var radius=280;
var shortTickSize=5;
var longTickSize=15;
var hourDigitDistance=320;
var minutesDigitDistance=290;
var nowInterval=setInterval(displayNow,1000);


document.getElementById("ampm").innerHTML=isAm?"matin":"après-midi";
document.getElementById("ampm").style.visibility="hidden";


(function drawClock(){
    var clock=document.getElementById("clock");
    for(var i=0;i<60;i++){
        var l=shortTickSize;
        var cl="tick";
        if(i%5==0){
            if(i%15==0){
                cl+=" mark";
            }
            cl+=" h";
            l=longTickSize;
            clock.appendChild(toSvg("text",{"class":(i%15==0)?"h digit mark":"h digit","x1":0,"y1":0,"font-size":40,"text-anchor":"middle","alignment-baseline":"middle","transform":"translate("+cx+" "+cy+") rotate("+i*6+") translate(0 -"+hourDigitDistance+") rotate("+(-i*6)+")"},i/5==0?"12":i/5));
        }else{
            cl+=" m";
        }
        clock.appendChild(toSvg("line",{"class":cl,"x1":0,"y1":0,"x2":l,"y2":0,"transform":"translate("+cx+" "+cy+") rotate("+i*6+") translate("+(radius-l)+" 0)"}));
        clock.appendChild(toSvg("text",{"class":"m digit","x1":0,"y1":0,"font-size":10,"text-anchor":"middle","alignment-baseline":"middle","transform":"translate("+cx+" "+cy+") rotate("+i*6+") translate(0 -"+minutesDigitDistance+") rotate("+(-i*6)+")"},leftPad(i,2,"0")));
    }
    clock.appendChild(toSvg("circle",{"class":"cadran","cx":cx,"cy":cy,"r":radius}));
    document.getElementById("heures").setAttributeNS(null,"transform","translate("+cx+" "+cy+") rotate(-90)");
    document.getElementById("minutes").setAttributeNS(null,"transform","translate("+cx+" "+cy+") rotate(-90)");
    document.getElementById("secondes").setAttributeNS(null,"transform","translate("+cx+" "+cy+") rotate(-90)");
})();


(function configureDisplaySliders(){
    document.getElementById("grad").addEventListener("input",function(evt){
        var value = evt.srcElement.value;
        document.querySelectorAll("line.m").forEach(e=>e.style.visibility="visible");
        document.querySelectorAll("line.h").forEach(e=>e.style.visibility="visible");
        document.querySelectorAll("circle.cadran").forEach(e=>e.style.visibility="visible");
        if(value<4){
            document.querySelectorAll("line.m").forEach(e=>e.style.visibility="hidden");
            if(value<3){
                document.querySelectorAll("line.h:not(.mark)").forEach(e=>e.style.visibility="hidden");
                if(value<2){
                    document.querySelectorAll("line.h.mark").forEach(e=>e.style.visibility="hidden");
                    if(value<1){
                        document.querySelectorAll("circle.cadran").forEach(e=>e.style.visibility="hidden");
                    }
                }
            }
        }
    });

    document.getElementById("digits").addEventListener("input",function(evt){
        var value = evt.srcElement.value;
        document.querySelectorAll("text.m").forEach(e=>e.style.visibility="visible");
        document.querySelectorAll("text.h").forEach(e=>e.style.visibility="visible");
        if(value<3){
            document.querySelectorAll("text.m").forEach(e=>e.style.visibility="hidden");
            if(value<2){
                document.querySelectorAll("text.h:not(.mark)").forEach(e=>e.style.visibility="hidden");
                if(value<1){
                    document.querySelectorAll("text.h.mark").forEach(e=>e.style.visibility="hidden");
                }
            }
        }
    })
})();


(function configureLiveButton(){
    document.getElementById("live").addEventListener('mouseup', function(){
        if(live){
            clearInterval(nowInterval);
            document.querySelectorAll(".live").forEach(e=>e.style.display="none");
            document.getElementById("live").style.backgroundColor="white";
            document.getElementById("live").innerHTML="mode Live : off";
            document.getElementById("ampm").style.visibility="visible";
            live=false;
        }else{
            nowInterval=setInterval(displayNow,100);
            document.querySelectorAll(".live").forEach(e=>e.style.display="inline");
            document.getElementById("live").style.backgroundColor="red";
            document.getElementById("live").innerHTML="mode Live : on";
            document.getElementById("ampm").style.visibility="hidden";
            live=true;
        }
    });
})();

(function configureAmPmButton(){
    document.getElementById("ampm").addEventListener('mouseup', function(){
        var currentHour = Number(document.getElementById("h").innerHTML);
        isAm=!isAm;
        document.getElementById("h").innerHTML=String(leftPad((currentHour+12)%(isAm?12:24),2,"0"));
        document.getElementById("ampm").innerHTML=isAm?"matin":"après-midi";
    });
})();
</script>

</body>

</html>
